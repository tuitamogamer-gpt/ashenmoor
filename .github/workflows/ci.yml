name: Ashenmoor CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: GAMES=250 npm run test:sim
      - run: npx playwright install --with-deps chromium
      - run: npm run test:browser
